<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auth page</title>
</head>
<body>
<h1>Authorize</h1>
<form id="authForm" name="authForm" action="/auth" method="post" class="mt-4">
    <label for="username">User name</label>
    <input type="username" id="username" name="username" autocomplete="on">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="on">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="on">

    <button type="submit" name="submitBtn">Sign up</button>
</form>
</body>
</html>
