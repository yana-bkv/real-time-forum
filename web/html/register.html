<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Auth page</title>
    <link rel="stylesheet" href="/web/css/style.css">
</head>
<body>
<h1>Authorize</h1>
<form id="authForm" name="authForm" action="/register" method="post" class="mt-4">
    <div class="form-group">
        <label for="username">User name</label>
        <input type="username" id="username" name="username" autocomplete="on">
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="on">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="on">
    </div>
    <button type="submit" name="submitBtn">Sign up</button>
</form>
</body>
</html>
