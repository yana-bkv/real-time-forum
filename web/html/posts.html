<!DOCTYPE html>
<html>
<head>
    <title>Forum posts</title>
    <link rel="stylesheet" href="/web/css/style.css">
</head>
<body>
<h1>Posts List</h1>
<form action="/user/createPost" method="POST">
    <input type="text" name="title" placeholder="Title" required></br></br>
    <input type="text" name="body" placeholder="New Post" required>
    <input type="text" name="author" placeholder="name" required>
    <button type="submit">Add</button>
</form>
<ul>
    {{range .}}
    <li>{{.Author}} </li>
    <li>{{.Title}} </li>
    <li>{{.Body}} <a href="/user/deletePost?id={{.ID}}">Delete</a></li>
    {{end}}
</ul>
</body>
</html>
